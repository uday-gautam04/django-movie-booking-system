<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>

    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .navbar {
            padding: 15px;
            background-color: #111;
        }

        .navbar a {
            color: #ffcc00;
            margin: 0 10px;
            text-decoration: none;
        }

        .container {
            margin-top: 30px;
        }

        .card {
            background-color: #2c2c2c;
            padding: 20px;
            margin: 20px auto;
            width: 350px;
            border-radius: 10px;
        }

        h1 {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="navbar">
    Welcome {{ user.username }} |
    <a href="/my-bookings/">My Bookings</a> |
    <a href="/logout/">Logout</a>
</div>

<h1>🎟️ My Bookings</h1>

<div class="container">
    {% for booking in bookings %}
        <div class="card">
            <p><strong>Movie:</strong> {{ booking.movie.title }}</p>
            <p><strong>Show Time:</strong> {{ booking.show.show_time }}</p>
            <p><strong>Seats:</strong> {{ booking.seats }}</p>

            <!-- ✅ NEW FIELD -->
            <p><strong>Booked On:</strong> {{ booking.booking_date }}</p>
        </div>
    {% empty %}
        <p>No bookings yet.</p>
    {% endfor %}
</div>

</body>
</html>
